name: E2E Integration Matrix

# Track 1-a (v1.0.1):
# Validates that the generator's output — actual generated scaffolds — compiles,
# lints clean, and runs its tests across the 7 representative dimension
# combinations the v1.0.0 plan locked. Distinct from samples.yml: that workflow
# runs on every PR against 3 canonical scaffolds (fast template-correctness
# gate). e2e.yml runs the broader matrix on opt-in PRs (via the `e2e` label),
# manual dispatch, and a nightly schedule. The nightly run is the basis for
# the future release gate (locked decision #4: green within 24 h of release
# commit).
#
# Structure: per-DB jobs instead of one monolithic matrix. GH Actions's
# `services:` block applies at the job level, so each DB type needs its own
# job with its own service container. Adopted in 1-a.2.1 (postgres);
# extended in 1-a.2.2 (mysql) and 1-a.2.3 (mongodb).
#
# Sub-phase progression:
#   1-a.0 — workflow skeleton + 5 new yo-rc scaffolds (PR #24)
#   1-a.1 — generate + cargo check + cargo clippy on all 7 (PR #24)
#   1-a.2 — cargo test per scaffold with DB service containers:
#     1-a.2.0 — sqlite (PR #25)
#     1-a.2.1 — postgres scaffolds (this PR)
#     1-a.2.2 — mysql scaffold (next)
#     1-a.2.3 — mongodb scaffolds (next)
#   1-a.3 — entity regeneration via JDL fixture + cargo check after regen
#   1-a.4 — docker-compose up + /health probe
#   1-a.5 — Cypress for monolith + gateway scaffolds
#   1-a.6 — per-scaffold tarpaulin (informational artifact, NOT gating per
#           locked decision #3 — coverage gating stays on samples.yml)

on:
  # Opt-in on PRs via the `e2e` label. The full matrix is expensive
  # (~10-15 min wall-clock when fully loaded); not every PR needs it.
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  # Manual dispatch — for ad-hoc runs from the Actions tab.
  workflow_dispatch:
  # Nightly at 08:00 UTC. Pre-release gate (locked decision #4) checks
  # that the most recent nightly run is green within 24 h of the release
  # commit. Wire-up of the release gate itself is deferred to release prep.
  schedule:
    - cron: '0 8 * * *'

permissions:
  contents: read

# Shared opt-in gate. All e2e-* jobs inherit this via `if:`.
# Workflow-level `if:` isn't supported, so it's duplicated per job.

jobs:
  # ---- e2e-sqlite ---------------------------------------------------
  # In-process: sqlite test_utils creates unique tmp files per pool.
  # No service container, no env vars, no setup.
  e2e-sqlite:
    name: ${{ matrix.scaffold }} (sqlite)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e'))
    strategy:
      fail-fast: false
      matrix:
        scaffold:
          - mono-sqlite-jwt-ng
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-03-27
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: e2e-${{ matrix.scaffold }}
          workspaces: |
            app/server -> target
      - name: Install blueprint dependencies
        run: npm ci
      - name: Generate scaffold
        run: |
          mkdir -p app
          cd app
          node "$GITHUB_WORKSPACE/cli/cli.cjs" generate-sample ${{ matrix.scaffold }} --skip-install --skip-git
      - name: Sanity-check generated tree
        working-directory: app
        run: |
          test -f server/Cargo.toml || { echo "FAIL: server/Cargo.toml missing"; exit 1; }
          test -f server/src/main.rs || { echo "FAIL: server/src/main.rs missing"; exit 1; }
          echo "Generated $(find server/src -name '*.rs' | wc -l) Rust files."
      - name: cargo check
        working-directory: app/server
        run: cargo check --all-targets
      - name: cargo clippy
        working-directory: app/server
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        working-directory: app/server
        run: cargo test --all-targets -- --test-threads=1

  # ---- e2e-postgres -------------------------------------------------
  # Three scaffolds use postgres as the test DB. Each matrix entry runs
  # in its own job instance with its own postgres service container, so
  # they don't conflict on shared state.
  #
  # test_utils.rs (postgres variant) reads TEST_DATABASE_URL, falls back
  # to DATABASE_URL + "_test" suffix, and auto-creates the test DB via
  # a maintenance connection — so the service container just needs the
  # default "postgres" superuser DB available.
  e2e-postgres:
    name: ${{ matrix.scaffold }} (postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e'))
    strategy:
      fail-fast: false
      matrix:
        scaffold:
          - mono-pg-jwt-react
          - microservice-cb
          - gateway-cb
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/jhipster_rust_test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/jhipster_rust_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-03-27
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: e2e-${{ matrix.scaffold }}
          workspaces: |
            app/server -> target
      - name: Install blueprint dependencies
        run: npm ci
      - name: Generate scaffold
        run: |
          mkdir -p app
          cd app
          node "$GITHUB_WORKSPACE/cli/cli.cjs" generate-sample ${{ matrix.scaffold }} --skip-install --skip-git
      - name: Sanity-check generated tree
        working-directory: app
        run: |
          test -f server/Cargo.toml || { echo "FAIL: server/Cargo.toml missing"; exit 1; }
          test -f server/src/main.rs || { echo "FAIL: server/src/main.rs missing"; exit 1; }
          echo "Generated $(find server/src -name '*.rs' | wc -l) Rust files."
      - name: Wait for postgres readiness
        run: |
          # services: has its own healthcheck, but cold runners can race;
          # belt-and-suspenders here (same pattern as samples.yml's coverage
          # gate).
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for postgres..."
            sleep 1
          done
      - name: cargo check
        working-directory: app/server
        run: cargo check --all-targets
      - name: cargo clippy
        working-directory: app/server
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        working-directory: app/server
        # --test-threads=1: same workaround samples.yml uses for the
        # canonical scaffold. Generated user_service / handlers::user /
        # auth_service tests hard-code user IDs (e.g. reactivate_user(2))
        # and reuse fixed logins. Tracked as a v1.0.2+ template refactor.
        run: cargo test --all-targets -- --test-threads=1

  # ---- e2e-mysql ----------------------------------------------------
  # No service container yet — cargo test wiring lands in 1-a.2.2. For
  # now this job runs generate + check + clippy only, mirroring the
  # pre-PR-#25 e2e-matrix behavior for the mysql scaffold.
  e2e-mysql:
    name: ${{ matrix.scaffold }} (mysql)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e'))
    strategy:
      fail-fast: false
      matrix:
        scaffold:
          - mono-mysql-oauth2-vue
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-03-27
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: e2e-${{ matrix.scaffold }}
          workspaces: |
            app/server -> target
      - name: Install blueprint dependencies
        run: npm ci
      - name: Generate scaffold
        run: |
          mkdir -p app
          cd app
          node "$GITHUB_WORKSPACE/cli/cli.cjs" generate-sample ${{ matrix.scaffold }} --skip-install --skip-git
      - name: Sanity-check generated tree
        working-directory: app
        run: |
          test -f server/Cargo.toml || { echo "FAIL: server/Cargo.toml missing"; exit 1; }
          test -f server/src/main.rs || { echo "FAIL: server/src/main.rs missing"; exit 1; }
          echo "Generated $(find server/src -name '*.rs' | wc -l) Rust files."
      - name: cargo check
        working-directory: app/server
        run: cargo check --all-targets
      - name: cargo clippy
        working-directory: app/server
        run: cargo clippy --all-targets -- -D warnings

  # ---- e2e-mongo ----------------------------------------------------
  # No service container yet — cargo test wiring lands in 1-a.2.3.
  e2e-mongo:
    name: ${{ matrix.scaffold }} (mongo)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e'))
    strategy:
      fail-fast: false
      matrix:
        scaffold:
          - mono-mongo-jwt-ng
          - ms-mongo-oauth2-consul
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-03-27
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: e2e-${{ matrix.scaffold }}
          workspaces: |
            app/server -> target
      - name: Install blueprint dependencies
        run: npm ci
      - name: Generate scaffold
        run: |
          mkdir -p app
          cd app
          node "$GITHUB_WORKSPACE/cli/cli.cjs" generate-sample ${{ matrix.scaffold }} --skip-install --skip-git
      - name: Sanity-check generated tree
        working-directory: app
        run: |
          test -f server/Cargo.toml || { echo "FAIL: server/Cargo.toml missing"; exit 1; }
          test -f server/src/main.rs || { echo "FAIL: server/src/main.rs missing"; exit 1; }
          echo "Generated $(find server/src -name '*.rs' | wc -l) Rust files."
      - name: cargo check
        working-directory: app/server
        run: cargo check --all-targets
      - name: cargo clippy
        working-directory: app/server
        run: cargo clippy --all-targets -- -D warnings

  # ---- Aggregator ---------------------------------------------------
  # Single status check for branch-protection use even though the work
  # spans multiple jobs.
  e2e-check:
    name: All E2E Scaffolds Pass
    runs-on: ubuntu-latest
    needs: [e2e-sqlite, e2e-postgres, e2e-mysql, e2e-mongo]
    if: |
      always() && (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule' ||
        (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e'))
      )
    steps:
      - name: Verify all scaffolds passed
        run: |
          for r in "${{ needs.e2e-sqlite.result }}" "${{ needs.e2e-postgres.result }}" "${{ needs.e2e-mysql.result }}" "${{ needs.e2e-mongo.result }}"; do
            if [ "$r" != "success" ]; then
              echo "One or more e2e jobs failed:"
              echo "  e2e-sqlite:   ${{ needs.e2e-sqlite.result }}"
              echo "  e2e-postgres: ${{ needs.e2e-postgres.result }}"
              echo "  e2e-mysql:    ${{ needs.e2e-mysql.result }}"
              echo "  e2e-mongo:    ${{ needs.e2e-mongo.result }}"
              exit 1
            fi
          done
          echo "All 7 scaffolds passed across 4 DB-typed jobs."
