  # ---- Aggregator ---------------------------------------------------
  # Single status check for branch-protection use even though the work
  # spans multiple jobs.
  e2e-check:
    name: All E2E Scaffolds Pass
    runs-on: ubuntu-latest
    needs:
      [
        e2e-sqlite,
        e2e-postgres,
        e2e-mysql,
        e2e-mongo,
        e2e-postgres-docker,
        e2e-mysql-docker,
        e2e-mongo-docker,
        e2e-cypress-gateway,
        e2e-cypress-sqlite,
        e2e-cypress-react,
        e2e-cypress-vue,
      ]
    if: |
      always() && (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule' ||
        (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e'))
      )
    steps:
      - name: Verify all scaffolds passed
        run: |
          for r in "${{ needs.e2e-sqlite.result }}" "${{ needs.e2e-postgres.result }}" "${{ needs.e2e-mysql.result }}" "${{ needs.e2e-mongo.result }}" "${{ needs.e2e-postgres-docker.result }}" "${{ needs.e2e-mysql-docker.result }}" "${{ needs.e2e-mongo-docker.result }}" "${{ needs.e2e-cypress-gateway.result }}" "${{ needs.e2e-cypress-sqlite.result }}" "${{ needs.e2e-cypress-react.result }}" "${{ needs.e2e-cypress-vue.result }}"; do
            if [ "$r" != "success" ]; then
              echo "One or more e2e jobs failed:"
              echo "  e2e-sqlite:           ${{ needs.e2e-sqlite.result }}"
              echo "  e2e-postgres:         ${{ needs.e2e-postgres.result }}"
              echo "  e2e-mysql:            ${{ needs.e2e-mysql.result }}"
              echo "  e2e-mongo:            ${{ needs.e2e-mongo.result }}"
              echo "  e2e-postgres-docker:  ${{ needs.e2e-postgres-docker.result }}"
              echo "  e2e-mysql-docker:     ${{ needs.e2e-mysql-docker.result }}"
              echo "  e2e-mongo-docker:     ${{ needs.e2e-mongo-docker.result }}"
              echo "  e2e-cypress-gateway:  ${{ needs.e2e-cypress-gateway.result }}"
              echo "  e2e-cypress-sqlite:   ${{ needs.e2e-cypress-sqlite.result }}"
              echo "  e2e-cypress-react:    ${{ needs.e2e-cypress-react.result }}"
              echo "  e2e-cypress-vue:      ${{ needs.e2e-cypress-vue.result }}"
              exit 1
            fi
          done
          echo "All scaffolds passed (Track 1-a.5.3 in progress)."
