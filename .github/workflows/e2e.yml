        run: |
          echo "--- docker compose ps -a ---"
          docker compose -f docker/app.yml ps -a
          echo "--- docker compose logs (all, last 500) ---"
          docker compose -f docker/app.yml logs --no-color | tail -500
      - name: Teardown
        if: always()
        working-directory: app
        run: docker compose -f docker/app.yml down -v

