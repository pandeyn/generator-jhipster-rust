name: E2E Integration Matrix

# Track 1-a (v1.0.1):
# Validates that the generator's output — actual generated scaffolds — compiles,
# lints clean, and runs its tests across the 7 representative dimension
# combinations the v1.0.0 plan locked. Distinct from samples.yml: that workflow
# runs on every PR against 3 canonical scaffolds (fast template-correctness
# gate). e2e.yml runs the broader matrix on opt-in PRs (via the `e2e` label),
# manual dispatch, and a nightly schedule. The nightly run is the basis for
# the future release gate (locked decision #4: green within 24 h of release
# commit).
#
# Structure: per-DB jobs instead of one monolithic matrix. GH Actions's
# `services:` block applies at the job level, so each DB type needs its own
# job with its own service container. Adopted in 1-a.2.1 (postgres);
# extended in 1-a.2.2 (mysql) and 1-a.2.3 (mongodb).
#
# Sub-phase progression:
#   1-a.0 — workflow skeleton + 5 new yo-rc scaffolds (PR #24)
#   1-a.1 — generate + cargo check + cargo clippy on all 7 (PR #24)
#   1-a.2 — cargo test per scaffold with DB service containers:
#     1-a.2.0 — sqlite (PR #25)
#     1-a.2.1 — postgres scaffolds (PR #26)
#     1-a.2.2 — mysql scaffold (PR #27)
#     1-a.2.3 — mongodb scaffolds (PR #28)
#   1-a.3 — entity regeneration via JDL fixture + cargo check after regen
#           (PR #29; also fixed diesel.toml [print_schema] overwrite AND
#           the migration-timestamp-collision bug for incremental
#           `jhipster jdl` onto a scaffold with existing entities)
#   1-a.4 — docker-compose up + /health probe (rolled out per-DB like
#           1-a.2; sqlite scaffold first in this PR, other DBs follow)
#   1-a.5 — Cypress for monolith + gateway scaffolds
#   1-a.6 — per-scaffold tarpaulin (informational artifact, NOT gating per
#           locked decision #3 — coverage gating stays on samples.yml)

on:
  # Opt-in on PRs via the `e2e` label. The full matrix is expensive
  # (~10-15 min wall-clock when fully loaded); not every PR needs it.
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  # Manual dispatch — for ad-hoc runs from the Actions tab.
  workflow_dispatch:
  # Nightly at 08:00 UTC. Pre-release gate (locked decision #4) checks
  # that the most recent nightly run is green within 24 h of the release
  # commit. Wire-up of the release gate itself is deferred to release prep.
  schedule:
    - cron: '0 8 * * *'

permissions:
  contents: read

# Shared opt-in gate. All e2e-* jobs inherit this via `if:`.
# Workflow-level `if:` isn't supported, so it's duplicated per job.

jobs:
  # ---- e2e-sqlite ---------------------------------------------------
  # In-process: sqlite test_utils creates unique tmp files per pool.
  # No service container, no env vars, no setup.
  e2e-sqlite:
    name: ${{ matrix.scaffold }} (sqlite)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e'))
    strategy:
      fail-fast: false
      matrix:
        scaffold:
          - mono-sqlite-jwt-ng
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-03-27
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: e2e-${{ matrix.scaffold }}
          workspaces: |
            app/server -> target
      - name: Install blueprint dependencies
        run: npm ci
      - name: Generate scaffold
        run: |
          mkdir -p app
          cd app
          node "$GITHUB_WORKSPACE/cli/cli.cjs" generate-sample ${{ matrix.scaffold }} --skip-install --skip-git
      - name: Sanity-check generated tree
        working-directory: app
        run: |
          test -f server/Cargo.toml || { echo "FAIL: server/Cargo.toml missing"; exit 1; }
          test -f server/src/main.rs || { echo "FAIL: server/src/main.rs missing"; exit 1; }
          echo "Generated $(find server/src -name '*.rs' | wc -l) Rust files."
      - name: cargo check
        working-directory: app/server
        run: cargo check --all-targets
      - name: cargo clippy
        working-directory: app/server
        run: cargo clippy --all-targets -- -D warnings
      - name: Import entity JDL (Author/Book/Tag — Track 1-a.3)
        working-directory: app
        # The blueprint's source.addEntityToRustSchema injects per-entity
        # `diesel::table!` blocks via needle markers in schema.rs. Mongo
        # scaffolds skip the diesel path entirely; the entity templates
        # still emit Author/Book/Tag models + handlers + services.
        run: |
          cp "$GITHUB_WORKSPACE/.github/workflows/fixtures/relationships.jdl" .
          node "$GITHUB_WORKSPACE/cli/cli.cjs" jdl relationships.jdl --skip-install --skip-git --force
      - name: cargo check after entity regen
        working-directory: app/server
        run: cargo check --all-targets
      - name: cargo test
        working-directory: app/server
        # Runs against the post-import scaffold (initial users/authorities
        # tables + the new Author/Book/Tag entities). --test-threads=1
        # mirrors samples.yml's canonical-scaffold workaround.
        run: cargo test --all-targets -- --test-threads=1
      # Track 1-a.4.0: docker-compose smoke test for the sqlite scaffold.
      # Builds the multi-stage Dockerfile, brings up the docker-compose
      # stack, polls /api/health until it responds, then tears down.
      # Confirms the generated Dockerfile + docker/app.yml + entrypoint
      # actually produce a running app — the closest CI gets to "what
      # an end user does after generating a scaffold". Other DBs follow
      # in 1-a.4.1+ once the sqlite case is proven.
      - name: docker-compose smoke test
        working-directory: app
        run: |
          set -e
          echo "::group::Build + start docker compose stack"
          docker compose -f docker/app.yml up -d --build
          echo "::endgroup::"
          echo "::group::Poll /api/health until UP (max 120s)"
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/api/health 2>/dev/null | grep -q '"status":"UP"'; then
              echo "OK — /api/health returned UP after ${i}*2s"
              curl -sS http://localhost:8080/api/health
              break
            fi
            echo "[$i/60] not yet up, sleeping 2s..."
            sleep 2
            if [ "$i" = "60" ]; then
              echo "FAIL — /api/health never returned UP"
              echo "--- last response ---"
              curl -v http://localhost:8080/api/health 2>&1 | tail -20 || true
              echo "--- docker compose logs ---"
              docker compose -f docker/app.yml logs --no-color | tail -100
              exit 1
            fi
          done
          echo "::endgroup::"
          echo "::group::Teardown"
          docker compose -f docker/app.yml down -v
          echo "::endgroup::"

  # ---- e2e-postgres -------------------------------------------------
  # Three scaffolds use postgres as the test DB. Each matrix entry runs
  # in its own job instance with its own postgres service container, so
  # they don't conflict on shared state.
  #
  # test_utils.rs (postgres variant) reads TEST_DATABASE_URL, falls back
  # to DATABASE_URL + "_test" suffix, and auto-creates the test DB via
  # a maintenance connection — so the service container just needs the
  # default "postgres" superuser DB available.
  e2e-postgres:
    name: ${{ matrix.scaffold }} (postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e'))
    strategy:
      fail-fast: false
      matrix:
        scaffold:
          - mono-pg-jwt-react
          - microservice-cb
          - gateway-cb
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/jhipster_rust_test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/jhipster_rust_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-03-27
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: e2e-${{ matrix.scaffold }}
          workspaces: |
            app/server -> target
      - name: Install blueprint dependencies
        run: npm ci
      - name: Generate scaffold
        run: |
          mkdir -p app
          cd app
          node "$GITHUB_WORKSPACE/cli/cli.cjs" generate-sample ${{ matrix.scaffold }} --skip-install --skip-git
      - name: Sanity-check generated tree
        working-directory: app
        run: |
          test -f server/Cargo.toml || { echo "FAIL: server/Cargo.toml missing"; exit 1; }
          test -f server/src/main.rs || { echo "FAIL: server/src/main.rs missing"; exit 1; }
          echo "Generated $(find server/src -name '*.rs' | wc -l) Rust files."
      - name: Wait for postgres readiness
        run: |
          # services: has its own healthcheck, but cold runners can race;
          # belt-and-suspenders here (same pattern as samples.yml's coverage
          # gate).
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for postgres..."
            sleep 1
          done
      - name: cargo check
        working-directory: app/server
        run: cargo check --all-targets
      - name: cargo clippy
        working-directory: app/server
        run: cargo clippy --all-targets -- -D warnings
      - name: Import entity JDL (Author/Book/Tag — Track 1-a.3)
        working-directory: app
        run: |
          cp "$GITHUB_WORKSPACE/.github/workflows/fixtures/relationships.jdl" .
          node "$GITHUB_WORKSPACE/cli/cli.cjs" jdl relationships.jdl --skip-install --skip-git --force
      - name: cargo check after entity regen
        working-directory: app/server
        run: cargo check --all-targets
      - name: cargo test
        working-directory: app/server
        # --test-threads=1: same workaround samples.yml uses for the
        # canonical scaffold. Generated user_service / handlers::user /
        # auth_service tests hard-code user IDs (e.g. reactivate_user(2))
        # and reuse fixed logins. Tracked as a v1.0.2+ template refactor.
        run: cargo test --all-targets -- --test-threads=1

  # ---- e2e-mysql ----------------------------------------------------
  # Mirrors e2e-postgres in shape: per-matrix-entry mysql service
  # container, TEST_DATABASE_URL env, scaffold's test_utils auto-creates
  # the test DB via maintenance connection.
  e2e-mysql:
    name: ${{ matrix.scaffold }} (mysql)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e'))
    strategy:
      fail-fast: false
      matrix:
        scaffold:
          - mono-mysql-oauth2-vue
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: mysql
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      TEST_DATABASE_URL: mysql://root:root@127.0.0.1:3306/jhipster_rust_test
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/jhipster_rust_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-03-27
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: e2e-${{ matrix.scaffold }}
          workspaces: |
            app/server -> target
      - name: Install blueprint dependencies
        run: npm ci
      - name: Generate scaffold
        run: |
          mkdir -p app
          cd app
          node "$GITHUB_WORKSPACE/cli/cli.cjs" generate-sample ${{ matrix.scaffold }} --skip-install --skip-git
      - name: Sanity-check generated tree
        working-directory: app
        run: |
          test -f server/Cargo.toml || { echo "FAIL: server/Cargo.toml missing"; exit 1; }
          test -f server/src/main.rs || { echo "FAIL: server/src/main.rs missing"; exit 1; }
          echo "Generated $(find server/src -name '*.rs' | wc -l) Rust files."
      - name: Wait for mysql readiness
        # Same belt-and-suspenders as postgres — services: health-cmd handles
        # cold-runner race but cargo test's first connection happens fast
        # enough to occasionally beat it.
        run: |
          until mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -proot --silent; do
            echo "Waiting for mysql..."
            sleep 1
          done
      - name: cargo check
        working-directory: app/server
        run: cargo check --all-targets
      - name: cargo clippy
        working-directory: app/server
        run: cargo clippy --all-targets -- -D warnings
      - name: Import entity JDL (Author/Book/Tag — Track 1-a.3)
        working-directory: app
        run: |
          cp "$GITHUB_WORKSPACE/.github/workflows/fixtures/relationships.jdl" .
          node "$GITHUB_WORKSPACE/cli/cli.cjs" jdl relationships.jdl --skip-install --skip-git --force
      - name: cargo check after entity regen
        working-directory: app/server
        run: cargo check --all-targets
      - name: cargo test
        working-directory: app/server
        # --test-threads=1: same workaround as postgres + canonical scaffolds.
        run: cargo test --all-targets -- --test-threads=1

  # ---- e2e-mongo ----------------------------------------------------
  # MongoDB scaffolds. test_utils.rs (mongo variant) reads TEST_MONGODB_URI
  # and TEST_MONGODB_DATABASE; no migrations needed (schemaless). Per-test
  # cleanup happens via clean_test_data_mongo() which drops all collections
  # except authorities and reseeds them.
  e2e-mongo:
    name: ${{ matrix.scaffold }} (mongo)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e'))
    strategy:
      fail-fast: false
      matrix:
        scaffold:
          - mono-mongo-jwt-ng
          - ms-mongo-oauth2-consul
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --quiet --eval 'db.runCommand({ ping: 1 })' || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      TEST_MONGODB_URI: mongodb://localhost:27017
      TEST_MONGODB_DATABASE: jhipster_rust_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-03-27
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: e2e-${{ matrix.scaffold }}
          workspaces: |
            app/server -> target
      - name: Install blueprint dependencies
        run: npm ci
      - name: Generate scaffold
        run: |
          mkdir -p app
          cd app
          node "$GITHUB_WORKSPACE/cli/cli.cjs" generate-sample ${{ matrix.scaffold }} --skip-install --skip-git
      - name: Sanity-check generated tree
        working-directory: app
        run: |
          test -f server/Cargo.toml || { echo "FAIL: server/Cargo.toml missing"; exit 1; }
          test -f server/src/main.rs || { echo "FAIL: server/src/main.rs missing"; exit 1; }
          echo "Generated $(find server/src -name '*.rs' | wc -l) Rust files."
      - name: Wait for mongo readiness
        run: |
          # Polls a ping via the runner-bundled mongosh isn't always available;
          # use docker exec on the service container instead. The container
          # is named after the service key; GH Actions exposes it via the
          # job's docker network.
          for i in $(seq 1 30); do
            if docker ps --filter "ancestor=mongo:7" --format '{{.Names}}' | head -1 | xargs -I{} docker exec {} mongosh --quiet --eval 'db.runCommand({ ping: 1 })' >/dev/null 2>&1; then
              echo "mongo is ready"
              break
            fi
            echo "Waiting for mongo... ($i/30)"
            sleep 2
          done
      - name: cargo check
        working-directory: app/server
        run: cargo check --all-targets
      - name: cargo clippy
        working-directory: app/server
        run: cargo clippy --all-targets -- -D warnings
      - name: Import entity JDL (Author/Book/Tag — Track 1-a.3)
        working-directory: app
        run: |
          cp "$GITHUB_WORKSPACE/.github/workflows/fixtures/relationships.jdl" .
          node "$GITHUB_WORKSPACE/cli/cli.cjs" jdl relationships.jdl --skip-install --skip-git --force
      - name: cargo check after entity regen
        working-directory: app/server
        run: cargo check --all-targets
      - name: cargo test
        working-directory: app/server
        # --test-threads=1: same workaround as other DBs.
        run: cargo test --all-targets -- --test-threads=1

  # ---- Aggregator ---------------------------------------------------
  # Single status check for branch-protection use even though the work
  # spans multiple jobs.
  e2e-check:
    name: All E2E Scaffolds Pass
    runs-on: ubuntu-latest
    needs: [e2e-sqlite, e2e-postgres, e2e-mysql, e2e-mongo]
    if: |
      always() && (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule' ||
        (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e'))
      )
    steps:
      - name: Verify all scaffolds passed
        run: |
          for r in "${{ needs.e2e-sqlite.result }}" "${{ needs.e2e-postgres.result }}" "${{ needs.e2e-mysql.result }}" "${{ needs.e2e-mongo.result }}"; do
            if [ "$r" != "success" ]; then
              echo "One or more e2e jobs failed:"
              echo "  e2e-sqlite:   ${{ needs.e2e-sqlite.result }}"
              echo "  e2e-postgres: ${{ needs.e2e-postgres.result }}"
              echo "  e2e-mysql:    ${{ needs.e2e-mysql.result }}"
              echo "  e2e-mongo:    ${{ needs.e2e-mongo.result }}"
              exit 1
            fi
          done
          echo "All 7 scaffolds passed across 4 DB-typed jobs."
