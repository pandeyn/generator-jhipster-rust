name: Samples
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  # Generate and build sample applications
  samples:
    name: ${{ matrix.sample }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        sample:
          - sample # Basic monolith sample
          - microservice-cb # Microservice with circuit breaker
          - gateway-cb # Gateway with circuit breaker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # Pinned to commit SHAs to defend against tag-rewriting supply chain attacks.
      # Dependabot (.github/dependabot.yml) opens weekly PRs to bump these.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-03-27
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            app/server -> target

      - name: Install blueprint dependencies
        run: npm ci

      - name: Generate sample application
        # Track 1-b.0 fix (2026-05-10): invoke the local CLI directly instead of
        # `npx --yes yo jhipster-rust:generate-sample`. `npx --yes yo` only installs
        # `yo` itself from npm; Yeoman then cannot find `generator-jhipster-rust`
        # because `npm ci` doesn't create a self-link in node_modules. The local
        # cli/cli.cjs computes devBlueprintPath from its own __dirname, so it
        # discovers .blueprint/generate-sample/ regardless of cwd. Tests the LOCAL
        # checkout (correct for PR-time CI), not whatever is published to npm.
        #
        # `--samples-folder samples` (from the original yo invocation) is dropped:
        # the JDL files live directly at .blueprint/generate-sample/templates/samples/,
        # and samplesGroup defaults to "samples" already. Passing samplesFolder=samples
        # would resolve to templates/samples/samples/ (nonexistent). The flag was a
        # latent bug masked by yo failing first.
        run: |
          mkdir -p app
          cd app
          node "$GITHUB_WORKSPACE/cli/cli.cjs" generate-sample ${{ matrix.sample }} --skip-install --skip-git

      - name: Check generated files
        working-directory: app
        run: |
          echo "=== Generated Files ==="
          ls -la
          echo ""
          echo "=== Server Directory ==="
          ls -la server/ || echo "No server directory"
          echo ""
          echo "=== Config Files ==="
          ls -la server/src/config/ || echo "No config directory"
          echo ""
          echo "=== Services ==="
          ls -la server/src/services/ || echo "No services directory"

      - name: Lint generated docker-entrypoint.sh
        working-directory: app
        # shellcheck is pre-installed on GitHub-hosted ubuntu-latest runners.
        # Catches shell-script regressions in the entrypoint template (e.g.,
        # `set -eu` violations, unquoted vars, broken case statements).
        run: shellcheck docker-entrypoint.sh

      - name: Check circuit breaker files (for cb samples)
        if: contains(matrix.sample, '-cb')
        working-directory: app
        run: |
          echo "=== Checking Circuit Breaker Files ==="
          if [ -f "server/src/config/circuit_breaker_config.rs" ]; then
            echo "✓ circuit_breaker_config.rs exists"
          else
            echo "✗ circuit_breaker_config.rs NOT found"
            exit 1
          fi

          if [ -f "server/src/services/circuit_breaker_service.rs" ]; then
            echo "✓ circuit_breaker_service.rs exists"
          else
            echo "✗ circuit_breaker_service.rs NOT found"
            exit 1
          fi

          if [ -f "server/src/services/resilient_http_client.rs" ]; then
            echo "✓ resilient_http_client.rs exists"
          else
            echo "✗ resilient_http_client.rs NOT found"
            exit 1
          fi

          if [ -f "docs/CIRCUIT_BREAKER.md" ]; then
            echo "✓ CIRCUIT_BREAKER.md documentation exists"
          else
            echo "✗ CIRCUIT_BREAKER.md NOT found"
            exit 1
          fi

          echo ""
          echo "=== Checking .env for circuit breaker config ==="
          grep "CIRCUIT_BREAKER" .env || (echo "✗ Circuit breaker config not in .env" && exit 1)
          echo "✓ Circuit breaker environment variables found"

      # Track 1-b.3 decision (2026-05-10): samples.yml is the fast
      # template-correctness gate (verifies emitted code compiles + lints
      # clean across the matrix on every PR). The deeper integration tests
      # (cargo test against real DBs, Cypress, tarpaulin) live in the
      # forthcoming e2e.yml from Track 1-a. Splitting concerns this way
      # avoids running expensive DB-provisioning + test execution on every PR;
      # nightly + pre-release e2e.yml covers that.
      #
      # `cargo test --release` and `cargo test circuit_breaker --release` were
      # removed here because test_utils::create_test_pool() requires
      # TEST_DATABASE_URL or DATABASE_URL — samples.yml does not provision a
      # database service container. Those tests run in e2e.yml where the
      # matrix scaffolds spin up their own DB containers.
      #
      # `cargo build --release` was replaced with `cargo clippy --release`
      # because clippy already performs a full release-mode compile + adds
      # lint checks. One step covers both compilation correctness and lint
      # cleanliness in release mode.

      # `cargo fmt` (without --check) replaces the previous `cargo fmt --check`
      # gate (2026-05-10 decision). The strict --check gate was catching real
      # template-side formatting bugs (e.g., long `.layer(middleware::from_fn_with_state(state.clone(), auth_middleware))`
      # that rustfmt wants to wrap; chained `.merge()` calls; trailing blank
      # lines). Fixing every template inline is ~1-2 days of polish work and
      # blocks v1.0.0's Track 1 / 1-a work. v1.0.1 will add a generator-side
      # hook that runs `cargo fmt` on emitted code automatically (the canonical
      # JHipster blueprint pattern — `prettier --write` on TS). Until then, the
      # CI runs the formatter informationally: the diff appears in the run log
      # if templates emit non-rustfmt-clean code, but doesn't fail the build.
      - name: Run Rust formatter (informational; v1.0.0 — not a gate)
        working-directory: app/server
        run: cargo fmt

      - name: Run Rust clippy (release mode — verifies compile + lints)
        working-directory: app/server
        run: cargo clippy --release --all-targets -- -D warnings

      # Track 1 Phase 0 sub-task 3 (2026-05-11): the canonical scaffold's source
      # tree is reused by the `coverage` job (defined below). We upload it as a
      # workflow artifact rather than regenerating from scratch, saving ~2 min
      # per CI run. Only microservice-cb is uploaded because tarpaulin runs
      # against the canonical scaffold only — the per-file coverage gate at
      # this stage is for the one shape that represents the most realistic
      # production deployment (postgres + jwt + circuit breaker + consul).
      #
      # Excluding app/server/target keeps the artifact small (~2-5 MB instead
      # of 200+ MB); coverage builds its own tarpaulin-instrumented target
      # anyway (different RUSTFLAGS, different fingerprint).
      - name: Upload canonical scaffold for coverage job
        if: matrix.sample == 'microservice-cb' && success()
        uses: actions/upload-artifact@v7
        with:
          name: scaffold-microservice-cb
          path: |
            app/Cargo.toml
            app/diesel.toml
            app/migrations
            app/server
            !app/server/target
          retention-days: 1
          if-no-files-found: error

  # Track 1 Phase 0 sub-task 3 (2026-05-11): coverage gate.
  #
  # Runs `cargo tarpaulin` against the canonical microservice-cb scaffold and
  # fails the build if coverage drops below the v1.0.0 threshold. The threshold
  # ratchets per release: v1.0.0 = 35 (5 points below the verified 39.92%
  # baseline, slack for measurement noise), v1.0.1 = 60, v1.0.2 = 70 as
  # Phase 1/2/3 of the per-file coverage push lands.
  #
  # Architecturally separate from `samples` because tarpaulin needs:
  #   - A postgres service container (test_utils tests need TEST_DATABASE_URL)
  #   - Instrumented build (-C instrument-coverage) — slower than clippy
  #   - Diesel migrations applied before tests run
  #
  # Keeping the canonical-scaffold focus matches the plan's Track 1-b.3 decision:
  # samples = fast template-correctness across the matrix; coverage = deep gate
  # on the one representative shape. e2e.yml (Track 1-a) will eventually expand
  # both axes; for v1.0.0 this is the minimum gate that catches coverage
  # regressions on PRs that touch templates.
  coverage:
    name: Coverage Gate (canonical scaffold)
    runs-on: ubuntu-latest
    needs: [samples]
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oldie_k8_pg_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/oldie_k8_pg_test
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/oldie_k8_pg_test
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-03-27

      # Tarpaulin builds with `-C instrument-coverage` — different fingerprint
      # than the clippy build in `samples`, so use a separate cache key to
      # avoid the two jobs fighting over the same cache. Both jobs warm their
      # own cache on subsequent runs.
      - name: Cache Rust dependencies (tarpaulin-instrumented)
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: app/server -> target
          prefix-key: tarpaulin

      - name: Download canonical scaffold from samples job
        uses: actions/download-artifact@v4
        with:
          name: scaffold-microservice-cb
          path: app/

      # Pin tarpaulin and diesel_cli versions for reproducibility. ^0.31 was
      # the version used to establish the 39.92% baseline locally (2026-05-11);
      # diesel_cli ^2.3 matches the diesel = "2.1" workspace dep with some
      # forward-compat margin.
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --version "^0.31" --locked

      - name: Install diesel CLI (postgres feature only)
        run: cargo install diesel_cli --no-default-features --features postgres --version "^2.3" --locked

      - name: Wait for postgres readiness
        run: |
          # services: declared above has its own healthcheck, but tarpaulin's
          # test pool construction races with it on cold runners — belt and
          # suspenders here.
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for postgres..."
            sleep 1
          done

      - name: Apply diesel migrations to test database
        working-directory: app
        run: diesel migration run

      - name: Run cargo tarpaulin (coverage gate)
        working-directory: app/server
        # Gate ratchet history (canonical scaffold microservice-cb):
        #   v0.9.9 local baseline:   39.92% (636/1593 with main.rs excluded)
        #   v1.0.0 initial gate:     35 (5pp slack under baseline)
        #   v1.0.0 post-Phase 1:     50 (Phase 1 a/b/c/d landed 56.52%,
        #                                6pp slack to absorb measurement noise).
        #   v1.0.1 post-Phase 3:     75 (current — Phase 2 + Phase 3 a/b/c
        #                                landed 84.36%, 9.36pp slack absorbs
        #                                mid-PR coverage churn and the
        #                                tracing_config ratio dip that's
        #                                structural per locked decision #5).
        # The v1.0.1 plan originally locked two intermediate ratchets (50 → 60
        # post-Phase-2, → 70 post-Phase-3). Phase 2 + Phase 3a delivered overall
        # to 83.71% — so far above the 60 gate that intermediate ratchets
        # became bookkeeping. Decision #8 (2026-06-07) bundled them into this
        # single 50 → 75 ratchet at the end of Phase 3.
        #
        # `-- --test-threads=1` serializes test execution. The canonical
        # scaffold's integration tests (handlers::user, services::auth_service,
        # services::user_service) hard-code user IDs (e.g. `reactivate_user(2)`)
        # and reuse fixed test logins, so parallel execution against the shared
        # `oldie_k8_pg_test` DB causes spurious failures:
        #   - "User 2 not found"  (id changed because another test ran first)
        #   - "duplicate key value violates unique constraint users_login_key"
        #   - "violates foreign key constraint user_authorities_user_id_fkey"
        # Fixing per-test isolation (transactional rollback / unique login
        # generation) is Phase 1 template-side work; until then, serialize.
        run: cargo tarpaulin --fail-under 75 -- --test-threads=1

  # Summary job to ensure all samples + coverage passed
  samples-check:
    name: All Samples Check
    runs-on: ubuntu-latest
    needs: [samples, coverage]
    if: always()
    steps:
      - name: Check sample + coverage results
        run: |
          if [ "${{ needs.samples.result }}" != "success" ]; then
            echo "Some samples failed!"
            exit 1
          fi
          if [ "${{ needs.coverage.result }}" != "success" ]; then
            echo "Coverage gate failed!"
            exit 1
          fi
          echo "All samples + coverage gate passed successfully!"
